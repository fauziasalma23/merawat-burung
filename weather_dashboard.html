<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather Dashboard 🌤️</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            width: 100%;
            max-width: 900px;
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }

        .search-box {
            display: flex;
            gap: 10px;
            margin-top: 20px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .search-box input {
            padding: 12px 20px;
            border: none;
            border-radius: 50px;
            width: 250px;
            font-size: 16px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
            transition: transform 0.3s;
        }

        .search-box input:focus {
            outline: none;
            transform: scale(1.05);
        }

        .search-box button {
            padding: 12px 30px;
            border: none;
            border-radius: 50px;
            background: white;
            color: #667eea;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
            transition: all 0.3s;
        }

        .search-box button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.3);
        }

        .main-card {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 30px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            margin-bottom: 20px;
            animation: slideIn 0.5s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .city-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            flex-wrap: wrap;
            gap: 20px;
        }

        .city-name {
            font-size: 2em;
            color: #333;
            font-weight: 600;
        }

        .current-time {
            font-size: 0.9em;
            color: #666;
        }

        .weather-main {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            margin-bottom: 30px;
            align-items: center;
        }

        .weather-display {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .weather-icon {
            font-size: 5em;
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% {
                transform: translateY(0px);
            }
            50% {
                transform: translateY(-10px);
            }
        }

        .temperature-section {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .temperature {
            font-size: 3em;
            font-weight: bold;
            color: #667eea;
        }

        .description {
            font-size: 1.2em;
            color: #666;
            text-transform: capitalize;
        }

        .feels-like {
            font-size: 0.95em;
            color: #999;
        }

        .details-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
        }

        .detail-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 15px;
            text-align: center;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
            transition: transform 0.3s;
        }

        .detail-card:hover {
            transform: translateY(-5px);
        }

        .detail-label {
            font-size: 0.85em;
            opacity: 0.9;
            margin-bottom: 8px;
        }

        .detail-value {
            font-size: 1.5em;
            font-weight: bold;
        }

        .forecast {
            margin-top: 40px;
            padding-top: 30px;
            border-top: 2px solid #eee;
        }

        .forecast h3 {
            color: #333;
            margin-bottom: 20px;
            font-size: 1.3em;
        }

        .forecast-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(100px, 1fr));
            gap: 10px;
        }

        .forecast-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 15px;
            border-radius: 15px;
            text-align: center;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
            transition: all 0.3s;
        }

        .forecast-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
        }

        .forecast-time {
            font-size: 0.8em;
            opacity: 0.9;
            margin-bottom: 8px;
        }

        .forecast-icon {
            font-size: 2em;
            margin: 8px 0;
        }

        .forecast-temp {
            font-size: 0.95em;
            font-weight: bold;
        }

        .loading {
            text-align: center;
            padding: 40px;
            font-size: 1.2em;
            color: white;
        }

        .spinner {
            border: 4px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top: 4px solid white;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }
            100% {
                transform: rotate(360deg);
            }
        }

        .error {
            background: #ff6b6b;
            color: white;
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 20px;
            text-align: center;
        }

        .footer {
            text-align: center;
            color: white;
            margin-top: 30px;
            font-size: 0.9em;
            opacity: 0.8;
        }

        @media (max-width: 600px) {
            .weather-main {
                grid-template-columns: 1fr;
            }

            .header h1 {
                font-size: 1.8em;
            }

            .search-box input {
                width: 100%;
            }

            .city-info {
                flex-direction: column;
                text-align: center;
            }

            .temperature {
                font-size: 2.5em;
            }

            .main-card {
                padding: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🌤️ Weather Dashboard</h1>
            <p>Get real-time weather information for any city</p>
            
            <div class="search-box">
                <input type="text" id="cityInput" placeholder="Enter city name..." autocomplete="off">
                <button onclick="searchWeather()">Search</button>
                <button onclick="getLocationWeather()">📍 Current Location</button>
            </div>
        </div>

        <div id="content">
            <div class="loading">
                <div class="spinner"></div>
                <p>Loading weather data...</p>
            </div>
        </div>

        <div class="footer">
            <p>Weather data provided by Open-Meteo API • Updated in real-time</p>
        </div>
    </div>

    <script>
        const API_BASE = 'https://geocoding-api.open-meteo.com/v1/search';
        const WEATHER_API = 'https://api.open-meteo.com/v1/forecast';

        // Default city on load
        window.addEventListener('load', () => {
            searchCity('Jakarta');
        });

        // Search on Enter key
        document.getElementById('cityInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') searchWeather();
        });

        function searchWeather() {
            const city = document.getElementById('cityInput').value.trim();
            if (city) searchCity(city);
        }

        async function searchCity(cityName) {
            try {
                showLoading();

                // Get coordinates from city name
                const geoResponse = await fetch(
                    `${API_BASE}?name=${encodeURIComponent(cityName)}&count=1&language=en&format=json`
                );
                const geoData = await geoResponse.json();

                if (!geoData.results || geoData.results.length === 0) {
                    showError('City not found. Please try another city.');
                    return;
                }

                const result = geoData.results[0];
                const { latitude, longitude, name, country, timezone } = result;

                // Get weather data
                const weatherResponse = await fetch(
                    `${WEATHER_API}?latitude=${latitude}&longitude=${longitude}&current=temperature_2m,relative_humidity_2m,apparent_temperature,weather_code,wind_speed_10m&hourly=temperature_2m,weather_code&timezone=${timezone}`
                );
                const weatherData = await weatherResponse.json();

                displayWeather(name, country, weatherData, timezone);
                document.getElementById('cityInput').value = '';

            } catch (error) {
                console.error('Error:', error);
                showError('Failed to fetch weather data. Please try again.');
            }
        }

        function displayWeather(cityName, country, data, timezone) {
            const current = data.current;
            const hourly = data.hourly;
            const weatherCode = current.weather_code;
            const temp = Math.round(current.temperature_2m);
            const feelsLike = Math.round(current.apparent_temperature);
            const humidity = current.relative_humidity_2m;
            const windSpeed = Math.round(current.wind_speed_10m * 3.6); // Convert m/s to km/h

            const description = getWeatherDescription(weatherCode);
            const icon = getWeatherIcon(weatherCode);

            // Get forecast for next 12 hours
            const forecastHours = [];
            const now = new Date();
            for (let i = 0; i < 12; i++) {
                const time = new Date(now.getTime() + i * 3600000);
                const hour = time.getHours();
                const hourIndex = i;
                forecastHours.push({
                    time: hour + ':00',
                    temp: Math.round(hourly.temperature_2m[hourIndex]),
                    icon: getWeatherIcon(hourly.weather_code[hourIndex])
                });
            }

            const html = `
                <div class="main-card">
                    <div class="city-info">
                        <div>
                            <div class="city-name">${cityName}, ${country}</div>
                            <div class="current-time">${new Date().toLocaleString()}</div>
                        </div>
                    </div>

                    <div class="weather-main">
                        <div class="weather-display">
                            <div class="weather-icon">${icon}</div>
                            <div class="temperature-section">
                                <div class="temperature">${temp}°C</div>
                                <div class="description">${description}</div>
                                <div class="feels-like">Feels like ${feelsLike}°C</div>
                            </div>
                        </div>

                        <div class="details-grid">
                            <div class="detail-card">
                                <div class="detail-label">💧 Humidity</div>
                                <div class="detail-value">${humidity}%</div>
                            </div>
                            <div class="detail-card">
                                <div class="detail-label">💨 Wind Speed</div>
                                <div class="detail-value">${windSpeed} km/h</div>
                            </div>
                        </div>
                    </div>

                    <div class="forecast">
                        <h3>⏰ 12-Hour Forecast</h3>
                        <div class="forecast-grid">
                            ${forecastHours.map(hour => `
                                <div class="forecast-card">
                                    <div class="forecast-time">${hour.time}</div>
                                    <div class="forecast-icon">${hour.icon}</div>
                                    <div class="forecast-temp">${hour.temp}°C</div>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                </div>
            `;

            document.getElementById('content').innerHTML = html;
        }

        function getWeatherDescription(code) {
            const descriptions = {
                0: 'Clear sky',
                1: 'Mainly clear',
                2: 'Partly cloudy',
                3: 'Overcast',
                45: 'Foggy',
                48: 'Foggy (rime)',
                51: 'Light drizzle',
                53: 'Moderate drizzle',
                55: 'Dense drizzle',
                61: 'Slight rain',
                63: 'Moderate rain',
                65: 'Heavy rain',
                71: 'Slight snow',
                73: 'Moderate snow',
                75: 'Heavy snow',
                77: 'Snow grains',
                80: 'Slight rain showers',
                81: 'Moderate rain showers',
                82: 'Violent rain showers',
                85: 'Slight snow showers',
                86: 'Heavy snow showers',
                95: 'Thunderstorm',
                96: 'Thunderstorm with hail',
                99: 'Thunderstorm with large hail'
            };
            return descriptions[code] || 'Unknown';
        }

        function getWeatherIcon(code) {
            if (code === 0) return '☀️';
            if (code === 1 || code === 2) return '🌤️';
            if (code === 3) return '☁️';
            if (code === 45 || code === 48) return '🌫️';
            if (code >= 51 && code <= 67) return '🌧️';
            if (code >= 71 && code <= 86) return '❄️';
            if (code >= 80 && code <= 82) return '🌦️';
            if (code >= 85 && code <= 86) return '🌨️';
            if (code >= 95 && code <= 99) return '⛈️';
            return '🌤️';
        }

        function showLoading() {
            document.getElementById('content').innerHTML = `
                <div class="loading">
                    <div class="spinner"></div>
                    <p>Loading weather data...</p>
                </div>
            `;
        }

        function showError(message) {
            document.getElementById('content').innerHTML = `
                <div class="error">
                    <strong>⚠️ Error:</strong> ${message}
                </div>
            `;
        }

        function getLocationWeather() {
            if (navigator.geolocation) {
                showLoading();
                navigator.geolocation.getCurrentPosition(
                    (position) => {
                        const { latitude, longitude } = position.coords;
                        getWeatherByCoordinates(latitude, longitude);
                    },
                    (error) => {
                        showError('Unable to get your location. Please enable location access.');
                    }
                );
            } else {
                showError('Geolocation is not supported by your browser.');
            }
        }

        async function getWeatherByCoordinates(lat, lon) {
            try {
                // Get city name from coordinates
                const reverseGeoResponse = await fetch(
                    `https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lon}`
                );
                const geoData = await reverseGeoResponse.json();
                const cityName = geoData.address?.city || geoData.address?.town || 'Current Location';
                const country = geoData.address?.country || '';

                // Get weather data
                const weatherResponse = await fetch(
                    `${WEATHER_API}?latitude=${lat}&longitude=${lon}&current=temperature_2m,relative_humidity_2m,apparent_temperature,weather_code,wind_speed_10m&hourly=temperature_2m,weather_code`
                );
                const weatherData = await weatherResponse.json();

                displayWeather(cityName, country, weatherData, weatherData.timezone);

            } catch (error) {
                console.error('Error:', error);
                showError('Failed to fetch weather data for your location.');
            }
        }
    </script>
</body>
</html>
